<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C76B"/>
      <stop offset="50%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#B8911F"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A227"/>
      <stop offset="100%" style="stop-color:#A07B1A"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="85" r="72" stroke="url(#gold)" stroke-width="3" fill="none"/>
  <!-- Inner ring -->
  <circle cx="100" cy="85" r="62" stroke="url(#gold)" stroke-width="1.5" fill="none"/>

  <!-- M letter -->
  <path d="M68 115 L68 60 L82 60 L100 90 L118 60 L132 60 L132 115 L120 115 L120 78 L104 105 L96 105 L80 78 L80 115 Z"
        fill="url(#gold)"/>

  <!-- D letter -->
  <path d="M138 60 L155 60 C170 60 180 72 180 87.5 C180 103 170 115 155 115 L138 115 Z M150 70 L150 105 C158 105 168 98 168 87.5 C168 77 158 70 150 70 Z"
        fill="url(#gold)"/>

  <!-- MENDES text -->
  <text x="100" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="600" letter-spacing="0.25em" fill="url(#gold)">MENDES</text>

  <!-- Left line -->
  <line x1="20" y1="200" x2="65" y2="200" stroke="url(#gold)" stroke-width="1"/>

  <!-- DESIGN text -->
  <text x="100" y="207" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="400" letter-spacing="0.4em" fill="url(#goldDark)">DESIGN</text>

  <!-- Right line -->
  <line x1="135" y1="200" x2="180" y2="200" stroke="url(#gold)" stroke-width="1"/>
</svg>
